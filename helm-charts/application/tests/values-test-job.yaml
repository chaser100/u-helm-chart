# Test with Job
replicaCount: 1
image: nginx
imageTag: 1.21
job:
  enabled: true
  name: migration-job
  nameOverride: run-migrations
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/sync-wave: "-50"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  podAnnotations:
    example.com/pod-annotation: "true"
  extraLabels:
    app.kubernetes.io/component: migration
  image: postgres:14
  imageTag: latest
  imagePullPolicy: IfNotPresent
  restartPolicy: Never
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  serviceAccountName: migration-sa
  command: ["/bin/bash", "-c"]
  args: ["psql -h $DB_HOST -U $DB_USER -d $DB_NAME -f /migrations/init.sql"]
  envFrom:
    - secretRef:
        name: app-env-secret
    - configMapRef:
        name: app-env-config
  env:
    - name: MIGRATION_ENV
      value: production
  envFromSecrets:
    - name: DB_HOST
      secretName: db-secret
      secretKey: host
    - name: DB_USER
      secretName: db-secret
      secretKey: user
    - name: DB_NAME
      secretName: db-secret
      secretKey: database
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
service:
  type: ClusterIP
  port: 80
