{{- if and .Values.route.enabled (not (default false .Values.deploymentDisable)) -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ default (include "application.fullname" .) .Values.route.name }}
  labels:
    {{- include "application.labels" . | nindent 4 }}
    {{- with .Values.route.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ required "route.gateway is required when route.enabled=true" .Values.route.gateway }}
      {{- with .Values.route.gatewayNamespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .Values.route.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  hostnames:
    - {{ .Values.route.hostname | quote }}
  rules:
    - matches:
        - path:
            type: {{ default "PathPrefix" .Values.route.pathMatchType }}
            value: {{ default "/" .Values.route.path }}
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "application.fullname" . }}
          port: {{ .Values.service.port }}
          weight: {{ default 1 .Values.route.backendWeight }}
{{- end }}
