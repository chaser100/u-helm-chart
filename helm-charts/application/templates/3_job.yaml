{{- if .Values.job.enabled }}
{{- $jobName := printf "%s-job" (include "application.fullname" .) }}
{{- if .Values.job.nameOverride }}
  {{- $jobName = .Values.job.nameOverride }}
{{- end }}
{{- if .Values.job.fullnameOverride }}
  {{- $jobName = .Values.job.fullnameOverride }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $jobName | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "application.labels" . | nindent 4 }}
    {{- with .Values.job.extraLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.job.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  backoffLimit: {{ .Values.job.backoffLimit | default 1 }}
  {{- with .Values.job.ttlSecondsAfterFinished }}
  ttlSecondsAfterFinished: {{ . }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "application.labels" . | nindent 8 }}
        {{- with .Values.job.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.job.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: {{ .Values.job.restartPolicy | default "OnFailure" }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.job.serviceAccountName | default (include "application.serviceAccountName" .) }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Values.job.name | default "job-runner" }}
          image: {{ .Values.job.image | default .Values.image }}:{{ .Values.job.imageTag | default .Values.imageTag }}
          imagePullPolicy: {{ .Values.job.imagePullPolicy | default "IfNotPresent" }}
          {{- if .Values.job.command }}
          command: {{ toYaml .Values.job.command | nindent 12 }}
          {{- end }}
          {{- if .Values.job.args }}
          args: {{ toYaml .Values.job.args | nindent 12 }}
          {{- end }}
          {{- $jobEnvVars := list }}
          {{- if .Values.job.env }}
            {{- range .Values.job.env }}
              {{- $jobEnvVars = append $jobEnvVars . }}
            {{- end }}
          {{- end }}
          {{- if .Values.env }}
            {{- range .Values.env }}
              {{- $jobEnvVars = append $jobEnvVars . }}
            {{- end }}
          {{- end }}
          {{- if and .Values.envSecrets .Values.envSecrets.enableEnv }}
            {{- range .Values.envSecrets.envs }}
              {{- $jobEnvVars = append $jobEnvVars (dict "name" .name "valueFrom" (dict "secretKeyRef" (dict "name" .secretName "key" .secretKey))) }}
            {{- end }}
          {{- end }}
          {{- with .Values.job.envFromSecrets }}
            {{- range . }}
              {{- $jobEnvVars = append $jobEnvVars (dict "name" .name "valueFrom" (dict "secretKeyRef" (dict "name" .secretName "key" .secretKey))) }}
            {{- end }}
          {{- end }}
          {{- if $jobEnvVars }}
          env:
            {{- range $jobEnvVars }}
            - name: {{ .name }}
              {{- if .value }}
              value: {{ .value | quote }}
              {{- else if .valueFrom }}
              valueFrom:
                {{- toYaml .valueFrom | nindent 16 }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- $jobEnvFromList := list }}
          {{- if and .Values.envFromSecrets .Values.envFromSecrets.enableEnvFrom }}
            {{- $jobEnvFromList = append $jobEnvFromList (dict "secretRef" (dict "name" .Values.envFromSecrets.secretName)) }}
          {{- end }}
          {{- with .Values.job.envFrom }}
            {{- range . }}
              {{- $jobEnvFromList = append $jobEnvFromList . }}
            {{- end }}
          {{- end }}
          {{- if $jobEnvFromList }}
          envFrom:
            {{- range $jobEnvFrom := $jobEnvFromList }}
            - {{- toYaml $jobEnvFrom | nindent 14 }}
            {{- end }}
          {{- end }}
          {{- with .Values.job.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $mounts := list }}
          {{- with .Values.volumeMounts }}
            {{- range . }}
              {{- $mounts = append $mounts . }}
            {{- end }}
          {{- end }}
          {{- range .Values.configMaps }}
          {{- if .mountPath }}
            {{- $mounts = append $mounts (dict "name" .name "mountPath" .mountPath "subPath" .subPath "readOnly" (default true .readOnly)) }}
          {{- end }}
          {{- end }}
          {{- if $mounts }}
          volumeMounts:
            {{- range $mount := $mounts }}
            - name: {{ $mount.name }}
              mountPath: {{ $mount.mountPath }}
              {{- if $mount.subPath }}
              subPath: {{ $mount.subPath }}
              {{- end }}
              readOnly: {{ $mount.readOnly }}
            {{- end }}
          {{- end }}
      {{- $vols := list }}
      {{- with .Values.volumes }}
        {{- range . }}
          {{- $vols = append $vols . }}
        {{- end }}
      {{- end }}
      {{- range .Values.configMaps }}
      {{- if .mountPath }}
        {{- $vols = append $vols (dict "name" .name "configMap" (dict "name" .name "items" .items "defaultMode" .defaultMode)) }}
      {{- end }}
      {{- end }}
      {{- if $vols }}
      volumes:
        {{- range $vol := $vols }}
        - name: {{ $vol.name }}
          {{- if $vol.secret }}
          secret:
            {{- toYaml $vol.secret | nindent 12 }}
          {{- else if $vol.configMap }}
          configMap:
            name: {{ $vol.configMap.name }}
            {{- if $vol.configMap.items }}
            items:
              {{- toYaml $vol.configMap.items | nindent 14 }}
            {{- end }}
            {{- if $vol.configMap.defaultMode }}
            defaultMode: {{ $vol.configMap.defaultMode }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
