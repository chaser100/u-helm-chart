name: Helm Tests

on:
  push:
    branches: [main]
    paths:
      - "helm-charts/application/**"
      - ".github/workflows/helm-tests.yml"
  pull_request:
    paths:
      - "helm-charts/application/**"
      - ".github/workflows/helm-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CHART_PATH: helm-charts/application

jobs:
  helm-tests:
    name: Lint and template tested examples
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310  # v5.0.1
        with:
          version: v3.18.4

      - name: Lint chart defaults
        shell: bash
        run: |
          set -euo pipefail
          helm lint "$CHART_PATH" --strict

          if helm template test "$CHART_PATH" | grep -q '^kind: ServiceMonitor$'; then
            echo "ServiceMonitor must not render with default values" >&2
            exit 1
          fi

      - name: Lint and template tested examples
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          values_files=("$CHART_PATH"/tests/*.yaml)
          if (( ${#values_files[@]} == 0 )); then
            echo "No tested values files found in $CHART_PATH/tests" >&2
            exit 1
          fi

          for values_file in "${values_files[@]}"; do
            echo "::group::Validating $values_file"
            helm lint "$CHART_PATH" --strict --values "$values_file"
            helm template test "$CHART_PATH" --values "$values_file" >/dev/null
            echo "::endgroup::"
          done

          echo "Validated ${#values_files[@]} tested examples"
